name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code-style:
    name: Code Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: vendor/bin/pint --test

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

  tests:
    name: Tests (PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.1', laravel: '10', testbench: '8', larastan: '2' }
          - { php: '8.2', laravel: '10', testbench: '8', larastan: '2' }
          - { php: '8.2', laravel: '11', testbench: '9', larastan: '3' }
          - { php: '8.2', laravel: '12', testbench: '10', larastan: '3' }
          - { php: '8.3', laravel: '11', testbench: '9', larastan: '3' }
          - { php: '8.3', laravel: '12', testbench: '10', larastan: '3' }
          - { php: '8.4', laravel: '11', testbench: '9', larastan: '3' }
          - { php: '8.4', laravel: '12', testbench: '10', larastan: '3' }

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:^${{ matrix.laravel }}" "orchestra/testbench:^${{ matrix.testbench }}" "larastan/larastan:^${{ matrix.larastan }}" --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
